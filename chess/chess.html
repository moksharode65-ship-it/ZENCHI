<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZENCHI Chess</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a2e;
      --bg-card-hover: #22223a;
      --border: rgba(255, 255, 255, 0.06);
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.3);
      --accent-secondary: #00d4aa;
      --square-light: #e8dcc8;
      --square-dark: #b08968;
      --square-selected: rgba(124, 92, 252, 0.55);
      --square-legal: rgba(0, 212, 170, 0.45);
      --square-last-move: rgba(255, 214, 0, 0.25);
      --square-check: rgba(255, 60, 60, 0.6);
      --white-piece: #ffffff;
      --black-piece: #1a1a2e;
      --danger: #ff4060;
      --success: #00d4aa;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(124, 92, 252, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 212, 170, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(124, 92, 252, 0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: rgba(18, 18, 26, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-controls {
      display: flex;
      gap: 10px;
    }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6040d0);
      border-color: transparent;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 30px rgba(124, 92, 252, 0.45);
      background: linear-gradient(135deg, #8a6cff, #7050e0);
    }

    .btn-danger {
      background: rgba(255, 64, 96, 0.15);
      border-color: rgba(255, 64, 96, 0.3);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: rgba(255, 64, 96, 0.25);
    }

    /* Main layout */
    .game-container {
      display: flex;
      gap: 24px;
      padding: 24px 32px;
      flex: 1;
      justify-content: center;
      align-items: flex-start;
    }

    /* Left panel */
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 260px;
      flex-shrink: 0;
    }

    .panel-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .panel-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* Player info */
    .player-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .player-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
      background: rgba(124, 92, 252, 0.08);
    }

    .player-avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .player-avatar.white-avatar {
      background: linear-gradient(135deg, #f0f0f0, #d0d0d0);
      color: #333;
    }

    .player-avatar.black-avatar {
      background: linear-gradient(135deg, #2a2a3e, #1a1a28);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .player-info h3 {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .player-info p {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Captured pieces */
    .captured-pieces {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      min-height: 28px;
      font-size: 1.2rem;
      margin-top: 8px;
    }

    /* Board section */
    .board-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .board-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.06),
        0 0 80px rgba(124, 92, 252, 0.08);
    }

    /* File/rank labels */
    .board-with-labels {
      display: grid;
      grid-template-columns: 28px 1fr;
      grid-template-rows: 1fr 28px;
      gap: 0;
    }

    .rank-labels {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      align-items: center;
      padding: 4px 0;
    }

    .rank-labels span, .file-labels span {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      width: 28px;
      text-align: center;
    }

    .file-labels {
      display: flex;
      justify-content: space-around;
      align-items: center;
      grid-column: 2;
      padding: 0 4px;
    }

    #board {
      width: min(65vw, 520px);
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      border-radius: 12px;
      overflow: hidden;
    }

    .square {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(3.2rem, 5.8vw);
      cursor: pointer;
      position: relative;
      transition: background 0.15s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .square.light { background: var(--square-light); }
    .square.dark { background: var(--square-dark); }

    .square.selected {
      background: var(--square-selected) !important;
    }

    .square.legal-move::after {
      content: '';
      position: absolute;
      width: 28%;
      height: 28%;
      border-radius: 50%;
      background: var(--square-legal);
      pointer-events: none;
    }

    .square.legal-capture {
      background: rgba(0, 212, 170, 0.2) !important;
    }

    .square.legal-capture::after {
      content: '';
      position: absolute;
      width: 85%;
      height: 85%;
      border-radius: 50%;
      border: 4px solid var(--square-legal);
      background: transparent;
      pointer-events: none;
    }

    .square.last-move {
      background-color: var(--square-last-move) !important;
    }

    .square.in-check {
      background: var(--square-check) !important;
      animation: checkPulse 1s ease-in-out infinite;
    }

    @keyframes checkPulse {
      0%, 100% { box-shadow: inset 0 0 15px rgba(255, 60, 60, 0.4); }
      50% { box-shadow: inset 0 0 30px rgba(255, 60, 60, 0.7); }
    }

    .square .piece {
      filter: drop-shadow(1px 2px 3px rgba(0, 0, 0, 0.4));
      transition: transform 0.1s ease;
      line-height: 1;
    }

    .square:hover .piece {
      transform: scale(1.08);
    }

    /* Status bar */
    .status-bar {
      text-align: center;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      min-width: 300px;
      transition: all 0.3s ease;
    }

    .status-bar.check {
      background: rgba(255, 64, 96, 0.15);
      border-color: rgba(255, 64, 96, 0.3);
      color: var(--danger);
    }

    .status-bar.checkmate {
      background: linear-gradient(135deg, rgba(124, 92, 252, 0.2), rgba(0, 212, 170, 0.2));
      border-color: var(--accent);
      color: var(--accent-secondary);
      font-size: 1.1rem;
    }

    .status-bar.draw {
      background: rgba(255, 214, 0, 0.1);
      border-color: rgba(255, 214, 0, 0.3);
      color: #ffd600;
    }

    /* Right panel */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 280px;
      flex-shrink: 0;
    }

    /* Move history */
    .move-history {
      max-height: 420px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-card-hover) transparent;
    }

    .move-history::-webkit-scrollbar { width: 5px; }
    .move-history::-webkit-scrollbar-thumb { background: var(--bg-card-hover); border-radius: 3px; }

    .move-row {
      display: grid;
      grid-template-columns: 36px 1fr 1fr;
      gap: 4px;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 0.88rem;
      transition: background 0.15s;
    }

    .move-row:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .move-number {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.8rem;
    }

    .move-notation {
      padding: 3px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-family: 'Inter', monospace;
      transition: all 0.15s;
    }

    .move-notation:hover {
      background: rgba(124, 92, 252, 0.15);
    }

    .move-notation.white-move { color: var(--text-primary); }
    .move-notation.black-move { color: var(--text-secondary); }

    .move-notation.current {
      background: rgba(124, 92, 252, 0.2);
      color: var(--accent);
    }

    .no-moves {
      text-align: center;
      color: var(--text-muted);
      padding: 30px 0;
      font-size: 0.85rem;
    }

    /* Game controls */
    .game-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .game-controls .btn {
      justify-content: center;
      padding: 12px;
      font-size: 0.82rem;
    }

    /* Promotion modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active { display: flex; }

    .promo-modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    }

    .promo-modal h3 {
      margin-bottom: 20px;
      font-size: 1.1rem;
    }

    .promo-options {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .promo-option {
      width: 70px;
      height: 70px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: var(--bg-secondary);
      font-size: 2.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .promo-option:hover {
      border-color: var(--accent);
      background: rgba(124, 92, 252, 0.15);
      transform: scale(1.1);
    }

    /* Game over modal */
    .game-over-modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      max-width: 380px;
    }

    .game-over-modal .result-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }

    .game-over-modal h2 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .game-over-modal p {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      z-index: 200;
      transition: transform 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .game-container { flex-direction: column; align-items: center; }
      .left-panel, .right-panel { width: 100%; max-width: 520px; }
      .left-panel { order: -1; flex-direction: row; }
      .left-panel .panel-card { flex: 1; }
    }

    @media (max-width: 640px) {
      header { padding: 12px 16px; }
      .game-container { padding: 16px; }
      .logo { font-size: 1.1rem; }
      .left-panel { flex-direction: column; }
      #board { width: min(92vw, 400px); }
      .square { font-size: min(2.6rem, 9vw); }
    }

    /* Move animation */
    @keyframes pieceDrop {
      0% { transform: scale(1.3); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    .piece-animated {
      animation: pieceDrop 0.2s ease-out;
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <div class="logo">
        <div class="logo-icon">♚</div>
        <span>ZENCHI Chess</span>
      </div>
      <div class="header-controls">
        <button class="btn" id="flipBtn" title="Flip board">🔄 Flip</button>
        <button class="btn" id="undoBtn" title="Undo last move">↩ Undo</button>
        <button class="btn btn-primary" id="newGameBtn">✦ New Game</button>
      </div>
    </header>

    <div class="game-container">
      <!-- Left panel -->
      <div class="left-panel">
        <div class="panel-card">
          <div class="panel-title">Black</div>
          <div class="player-card" id="blackPlayer">
            <div class="player-avatar black-avatar">♚</div>
            <div class="player-info">
              <h3>Player 2</h3>
              <p id="blackTimer">Black pieces</p>
            </div>
          </div>
          <div class="captured-pieces" id="blackCaptured"></div>
        </div>

        <div class="panel-card">
          <div class="panel-title">White</div>
          <div class="player-card active" id="whitePlayer">
            <div class="player-avatar white-avatar">♔</div>
            <div class="player-info">
              <h3>Player 1</h3>
              <p id="whiteTimer">White pieces</p>
            </div>
          </div>
          <div class="captured-pieces" id="whiteCaptured"></div>
        </div>
      </div>

      <!-- Board -->
      <div class="board-section">
        <div class="board-wrapper">
          <div class="board-with-labels">
            <div class="rank-labels" id="rankLabels"></div>
            <div id="board"></div>
            <div class="file-labels" id="fileLabels"></div>
          </div>
        </div>
        <div class="status-bar" id="statusBar">White to move</div>
      </div>

      <!-- Right panel -->
      <div class="right-panel">
        <div class="panel-card">
          <div class="panel-title">Moves</div>
          <div class="move-history" id="moveHistory">
            <div class="no-moves">No moves yet — make your opening!</div>
          </div>
        </div>

        <div class="panel-card">
          <div class="panel-title">Controls</div>
          <div class="game-controls">
            <button class="btn" id="undoBtn2">↩ Undo</button>
            <button class="btn btn-danger" id="resignBtn">⚑ Resign</button>
            <button class="btn" id="flipBtn2">🔄 Flip Board</button>
            <button class="btn btn-primary" id="newGameBtn2">✦ New Game</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Promotion modal -->
  <div class="modal-overlay" id="promoModal">
    <div class="promo-modal">
      <h3>Choose promotion piece</h3>
      <div class="promo-options" id="promoOptions"></div>
    </div>
  </div>

  <!-- Game over modal -->
  <div class="modal-overlay" id="gameOverModal">
    <div class="game-over-modal">
      <div class="result-icon" id="resultIcon">🏆</div>
      <h2 id="resultTitle">Checkmate!</h2>
      <p id="resultDesc">White wins by checkmate</p>
      <button class="btn btn-primary" id="playAgainBtn" style="margin:0 auto;">✦ Play Again</button>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast" id="toast"></div>

  <script>
    // ── Game state ──
    const game = new Chess();
    let selectedSquare = null;
    let legalMoves = [];
    let flipped = false;
    let lastMove = null;
    let moveList = [];
    let pendingPromotion = null;

    // Piece unicode mapping
    const PIECES = {
      wK: '♔', wQ: '♕', wR: '♖', wB: '♗', wN: '♘', wP: '♙',
      bK: '♚', bQ: '♛', bR: '♜', bB: '♝', bN: '♞', bP: '♟'
    };

    // Piece values for material calculation
    const PIECE_VALUES = { p: 1, n: 3, b: 3, r: 5, q: 9 };

    // ── DOM refs ──
    const boardEl = document.getElementById('board');
    const statusBar = document.getElementById('statusBar');
    const moveHistoryEl = document.getElementById('moveHistory');
    const whitePlayerEl = document.getElementById('whitePlayer');
    const blackPlayerEl = document.getElementById('blackPlayer');
    const whiteCapturedEl = document.getElementById('whiteCaptured');
    const blackCapturedEl = document.getElementById('blackCaptured');
    const promoModal = document.getElementById('promoModal');
    const promoOptions = document.getElementById('promoOptions');
    const gameOverModal = document.getElementById('gameOverModal');
    const toastEl = document.getElementById('toast');

    // ── Initialize ──
    function init() {
      renderLabels();
      renderBoard();
      updateStatus();
      updatePlayers();
      updateCaptured();
      renderMoveHistory();
    }

    // ── Board labels ──
    function renderLabels() {
      const rankLabels = document.getElementById('rankLabels');
      const fileLabels = document.getElementById('fileLabels');
      rankLabels.innerHTML = '';
      fileLabels.innerHTML = '';

      const ranks = flipped ? ['1','2','3','4','5','6','7','8'] : ['8','7','6','5','4','3','2','1'];
      const files = flipped ? ['h','g','f','e','d','c','b','a'] : ['a','b','c','d','e','f','g','h'];

      ranks.forEach(r => {
        const s = document.createElement('span');
        s.textContent = r;
        rankLabels.appendChild(s);
      });
      files.forEach(f => {
        const s = document.createElement('span');
        s.textContent = f;
        fileLabels.appendChild(s);
      });
    }

    // ── Render board ──
    function renderBoard(animatedSquare = null) {
      boardEl.innerHTML = '';
      const board = game.board();

      for (let visualRow = 0; visualRow < 8; visualRow++) {
        for (let visualCol = 0; visualCol < 8; visualCol++) {
          const row = flipped ? 7 - visualRow : visualRow;
          const col = flipped ? 7 - visualCol : visualCol;
          const file = 'abcdefgh'[col];
          const rank = 8 - row;
          const squareName = file + rank;

          const sq = document.createElement('div');
          sq.className = 'square ' + ((row + col) % 2 === 0 ? 'light' : 'dark');
          sq.dataset.square = squareName;

          // Last move highlight
          if (lastMove && (squareName === lastMove.from || squareName === lastMove.to)) {
            sq.classList.add('last-move');
          }

          // Selected highlight
          if (selectedSquare === squareName) {
            sq.classList.add('selected');
          }

          // Legal move dots
          if (legalMoves.some(m => m.to === squareName)) {
            const piece = board[row][col];
            if (piece) {
              sq.classList.add('legal-capture');
            } else {
              sq.classList.add('legal-move');
            }
          }

          // Check highlight
          if (game.in_check()) {
            const piece = board[row][col];
            if (piece && piece.type === 'k' && piece.color === game.turn()) {
              sq.classList.add('in-check');
            }
          }

          // Place piece
          const piece = board[row][col];
          if (piece) {
            const pieceSpan = document.createElement('span');
            pieceSpan.className = 'piece';
            const key = (piece.color === 'w' ? 'w' : 'b') + piece.type.toUpperCase();
            pieceSpan.textContent = PIECES[key] || piece.type;

            if (animatedSquare === squareName) {
              pieceSpan.classList.add('piece-animated');
            }

            sq.appendChild(pieceSpan);
          }

          sq.addEventListener('click', () => onSquareClick(squareName));
          boardEl.appendChild(sq);
        }
      }
    }

    // ── Square click handler ──
    function onSquareClick(squareName) {
      if (game.game_over()) return;

      const board = game.board();
      const sqCoords = squareToCoords(squareName);
      const piece = board[sqCoords.row][sqCoords.col];

      // If we have a selected piece, try to move
      if (selectedSquare) {
        const moveObj = legalMoves.find(m => m.to === squareName);
        if (moveObj) {
          // Check if promotion
          const fromCoords = squareToCoords(selectedSquare);
          const fromPiece = board[fromCoords.row][fromCoords.col];
          if (fromPiece && fromPiece.type === 'p' &&
              ((fromPiece.color === 'w' && sqCoords.row === 0) ||
               (fromPiece.color === 'b' && sqCoords.row === 7))) {
            pendingPromotion = { from: selectedSquare, to: squareName };
            showPromotionModal(fromPiece.color);
            return;
          }
          makeMove(selectedSquare, squareName);
          return;
        }

        // Clicked on own piece → reselect
        if (piece && piece.color === game.turn()) {
          selectSquare(squareName);
          return;
        }

        // Clicked elsewhere → deselect
        deselectSquare();
        return;
      }

      // No selection → select own piece
      if (piece && piece.color === game.turn()) {
        selectSquare(squareName);
      }
    }

    function squareToCoords(sq) {
      const col = sq.charCodeAt(0) - 97;
      const row = 8 - parseInt(sq[1]);
      return { row, col };
    }

    function selectSquare(squareName) {
      selectedSquare = squareName;
      legalMoves = game.moves({ square: squareName, verbose: true });
      renderBoard();
    }

    function deselectSquare() {
      selectedSquare = null;
      legalMoves = [];
      renderBoard();
    }

    function makeMove(from, to, promotion = null) {
      const moveConfig = { from, to };
      if (promotion) moveConfig.promotion = promotion;

      const result = game.move(moveConfig);
      if (!result) {
        showToast('Illegal move!');
        deselectSquare();
        return;
      }

      lastMove = { from, to };
      moveList.push(result);
      selectedSquare = null;
      legalMoves = [];
      pendingPromotion = null;

      renderBoard(to);
      updateStatus();
      updatePlayers();
      updateCaptured();
      renderMoveHistory();

      // Play sound effect via Web Audio
      playMoveSound(result.captured ? 'capture' : 'move');

      // Check for game over
      if (game.game_over()) {
        setTimeout(() => showGameOver(), 500);
      }
    }

    // ── Promotion modal ──
    function showPromotionModal(color) {
      promoOptions.innerHTML = '';
      const pieces = ['q', 'r', 'b', 'n'];
      const names = { q: 'Queen', r: 'Rook', b: 'Bishop', n: 'Knight' };

      pieces.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'promo-option';
        const key = (color === 'w' ? 'w' : 'b') + p.toUpperCase();
        btn.textContent = PIECES[key];
        btn.title = names[p];
        btn.addEventListener('click', () => {
          promoModal.classList.remove('active');
          makeMove(pendingPromotion.from, pendingPromotion.to, p);
        });
        promoOptions.appendChild(btn);
      });

      promoModal.classList.add('active');
    }

    // ── Status bar update ──
    function updateStatus() {
      statusBar.className = 'status-bar';

      if (game.in_checkmate()) {
        const winner = game.turn() === 'w' ? 'Black' : 'White';
        statusBar.textContent = `Checkmate! ${winner} wins! 🏆`;
        statusBar.classList.add('checkmate');
      } else if (game.in_stalemate()) {
        statusBar.textContent = 'Stalemate — Draw! 🤝';
        statusBar.classList.add('draw');
      } else if (game.in_threefold_repetition()) {
        statusBar.textContent = 'Threefold repetition — Draw! 🤝';
        statusBar.classList.add('draw');
      } else if (game.insufficient_material()) {
        statusBar.textContent = 'Insufficient material — Draw! 🤝';
        statusBar.classList.add('draw');
      } else if (game.in_draw()) {
        statusBar.textContent = 'Draw! 🤝';
        statusBar.classList.add('draw');
      } else if (game.in_check()) {
        const who = game.turn() === 'w' ? 'White' : 'Black';
        statusBar.textContent = `${who} is in check! ⚠️`;
        statusBar.classList.add('check');
      } else {
        const who = game.turn() === 'w' ? 'White' : 'Black';
        statusBar.textContent = `${who} to move`;
      }
    }

    // ── Player card active state ──
    function updatePlayers() {
      if (game.turn() === 'w') {
        whitePlayerEl.classList.add('active');
        blackPlayerEl.classList.remove('active');
      } else {
        blackPlayerEl.classList.add('active');
        whitePlayerEl.classList.remove('active');
      }
    }

    // ── Captured pieces ──
    function updateCaptured() {
      const history = game.history({ verbose: true });
      const whiteCaptured = []; // pieces white captured (black pieces)
      const blackCaptured = []; // pieces black captured (white pieces)

      history.forEach(m => {
        if (m.captured) {
          if (m.color === 'w') {
            whiteCaptured.push({ type: m.captured, color: 'b' });
          } else {
            blackCaptured.push({ type: m.captured, color: 'w' });
          }
        }
      });

      // Sort by value
      const sortByValue = (a, b) => (PIECE_VALUES[b.type] || 0) - (PIECE_VALUES[a.type] || 0);
      whiteCaptured.sort(sortByValue);
      blackCaptured.sort(sortByValue);

      whiteCapturedEl.innerHTML = whiteCaptured.map(p => {
        const key = 'b' + p.type.toUpperCase();
        return `<span title="${p.type}">${PIECES[key]}</span>`;
      }).join('');

      blackCapturedEl.innerHTML = blackCaptured.map(p => {
        const key = 'w' + p.type.toUpperCase();
        return `<span title="${p.type}">${PIECES[key]}</span>`;
      }).join('');
    }

    // ── Move history ──
    function renderMoveHistory() {
      const history = game.history();

      if (!history.length) {
        moveHistoryEl.innerHTML = '<div class="no-moves">No moves yet — make your opening!</div>';
        return;
      }

      let html = '';
      for (let i = 0; i < history.length; i += 2) {
        const moveNum = Math.floor(i / 2) + 1;
        const whiteMove = history[i];
        const blackMove = history[i + 1];
        const isCurrent = (i + 1 === history.length - 1) || (i === history.length - 1);

        html += `<div class="move-row">`;
        html += `<span class="move-number">${moveNum}.</span>`;
        html += `<span class="move-notation white-move ${i === history.length - 1 && !blackMove ? 'current' : ''}">${whiteMove}</span>`;
        if (blackMove) {
          html += `<span class="move-notation black-move ${i + 1 === history.length - 1 ? 'current' : ''}">${blackMove}</span>`;
        } else {
          html += `<span></span>`;
        }
        html += `</div>`;
      }

      moveHistoryEl.innerHTML = html;
      moveHistoryEl.scrollTop = moveHistoryEl.scrollHeight;
    }

    // ── Game over modal ──
    function showGameOver() {
      const resultIcon = document.getElementById('resultIcon');
      const resultTitle = document.getElementById('resultTitle');
      const resultDesc = document.getElementById('resultDesc');

      if (game.in_checkmate()) {
        const winner = game.turn() === 'w' ? 'Black' : 'White';
        resultIcon.textContent = '🏆';
        resultTitle.textContent = 'Checkmate!';
        resultDesc.textContent = `${winner} wins the game!`;
      } else if (game.in_stalemate()) {
        resultIcon.textContent = '🤝';
        resultTitle.textContent = 'Stalemate';
        resultDesc.textContent = 'The game is a draw by stalemate.';
      } else if (game.in_draw()) {
        resultIcon.textContent = '🤝';
        resultTitle.textContent = 'Draw';
        resultDesc.textContent = 'The game ended in a draw.';
      }

      gameOverModal.classList.add('active');
    }

    // ── Sound effects (Web Audio API) ──
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playMoveSound(type) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'capture') {
        osc.frequency.value = 200;
        osc.type = 'square';
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.15);
      } else {
        osc.frequency.value = 600;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.08);
      }
    }

    // ── Toast ──
    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 2000);
    }

    // ── New game ──
    function newGame() {
      game.reset();
      selectedSquare = null;
      legalMoves = [];
      lastMove = null;
      moveList = [];
      pendingPromotion = null;
      gameOverModal.classList.remove('active');
      init();
      showToast('New game started!');
    }

    // ── Undo ──
    function undoMove() {
      if (game.history().length === 0) {
        showToast('Nothing to undo');
        return;
      }
      game.undo();
      moveList.pop();
      const history = game.history({ verbose: true });
      lastMove = history.length ? { from: history[history.length - 1].from, to: history[history.length - 1].to } : null;
      selectedSquare = null;
      legalMoves = [];
      renderBoard();
      updateStatus();
      updatePlayers();
      updateCaptured();
      renderMoveHistory();
      showToast('Move undone');
    }

    // ── Flip board ──
    function flipBoard() {
      flipped = !flipped;
      renderLabels();
      renderBoard();
      showToast(`Board flipped — ${flipped ? 'Black' : 'White'} at bottom`);
    }

    // ── Resign ──
    function resign() {
      if (game.game_over()) return;
      const who = game.turn() === 'w' ? 'White' : 'Black';
      const winner = game.turn() === 'w' ? 'Black' : 'White';

      const resultIcon = document.getElementById('resultIcon');
      const resultTitle = document.getElementById('resultTitle');
      const resultDesc = document.getElementById('resultDesc');
      resultIcon.textContent = '🏳️';
      resultTitle.textContent = `${who} Resigns`;
      resultDesc.textContent = `${winner} wins by resignation!`;
      gameOverModal.classList.add('active');

      // End the game by loading a dummy position
      game.load('4k3/8/8/8/8/8/8/4K3 w - - 0 1');
    }

    // ── Event listeners ──
    document.getElementById('newGameBtn').addEventListener('click', newGame);
    document.getElementById('newGameBtn2').addEventListener('click', newGame);
    document.getElementById('undoBtn').addEventListener('click', undoMove);
    document.getElementById('undoBtn2').addEventListener('click', undoMove);
    document.getElementById('flipBtn').addEventListener('click', flipBoard);
    document.getElementById('flipBtn2').addEventListener('click', flipBoard);
    document.getElementById('resignBtn').addEventListener('click', resign);
    document.getElementById('playAgainBtn').addEventListener('click', newGame);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        undoMove();
      }
      if (e.key === 'f' && !e.ctrlKey && !e.metaKey) {
        const tag = document.activeElement.tagName;
        if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
          flipBoard();
        }
      }
      if (e.key === 'n' && !e.ctrlKey && !e.metaKey) {
        const tag = document.activeElement.tagName;
        if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
          newGame();
        }
      }
      if (e.key === 'Escape') {
        deselectSquare();
        promoModal.classList.remove('active');
      }
    });

    // ── Start ──
    init();
  </script>
</body>
</html>
