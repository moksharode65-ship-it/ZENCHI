<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Void Striker II</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #030016;
      font-family: 'Exo 2', sans-serif;
      color: #fff;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    #c {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 22px 0;
    }

    #logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #f0a, #ff0, #f0a);
      background-size: 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: sh 3s linear infinite;
    }

    @keyframes sh {
      to {
        background-position: 200%
      }
    }

    #hudmain {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 22px;
    }

    .hud-box {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hud-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(0, 200, 255, 0.6);
    }

    .hud-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    #combo {
      color: #ff0;
    }

    #lives {
      color: #f55;
    }

    #wave {
      color: #0ff;
    }

    #powerbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      max-width: 90%;
      z-index: 10;
      pointer-events: none;
    }

    #powerlabel {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 4px;
    }

    #powertrack {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    #powergo {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0af, #0ff);
      transition: width 0.1s;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: rgba(3, 0, 22, 0.95);
    }

    #overlay.hidden {
      display: none;
    }

    #overlay-box {
      background: rgba(10, 5, 20, 0.98);
      border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 0 60px rgba(0, 255, 255, 0.1);
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      max-width: 90%;
    }

    #game-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(90deg, #f0a, #ff0, #f0a);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    #instructions {
      font-size: 11px;
      color: #668;
      line-height: 2;
      letter-spacing: 1px;
    }

    #start-btn {
      padding: 14px 50px;
      background: transparent;
      border: 2px solid rgba(0, 255, 255, 0.6);
      color: #0ff;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    #start-btn:hover {
      background: rgba(0, 255, 255, 0.15);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
    }

    #game-over {
      display: none;
    }

    #game-over.show {
      display: block;
    }

    #wave-announce {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 36px;
      font-weight: 900;
      color: #0ff;
      text-shadow: 0 0 30px #0ff;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #wave-announce.show {
      opacity: 1;
    }

    #boss-announce {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 42px;
      font-weight: 900;
      color: #f44;
      text-shadow: 0 0 40px #f44;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
    }

    #boss-announce.show {
      animation: bossflash 2s ease-out forwards;
    }

    @keyframes bossflash {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }

      20% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }

      80% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    /* Mobile controls */
    #mobile-ctrl {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 0;
      right: 0;
      z-index: 20;
      justify-content: space-between;
      padding: 0 20px;
    }

    @media (max-width: 768px) {
      #mobile-ctrl {
        display: flex;
      }

      #instructions {
        display: none;
      }
    }

    .mbtn {
      width: 70px;
      height: 50px;
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0ff;
      font-size: 20px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .mbtn:active {
      background: rgba(0, 255, 255, 0.3);
    }

    .mbtn-fire {
      background: rgba(255, 60, 60, 0.15);
      border-color: rgba(255, 60, 60, 0.4);
      color: #f55;
      width: 90px;
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>

  <div id="hud">
    <div id="topbar">
      <div id="logo">VOID STRIKER II</div>
      <div id="wave"></div>
    </div>
    <div id="hudmain">
      <div class="hud-box">
        <div class="hud-label">Score</div>
        <div class="hud-value" id="score">0</div>
      </div>
      <div class="hud-box" style="align-items: center;">
        <div class="hud-label">Combo</div>
        <div class="hud-value" id="combo">×1</div>
      </div>
      <div class="hud-box" style="align-items: flex-end;">
        <div class="hud-label">Lives</div>
        <div class="hud-value" id="lives">♥♥♥</div>
      </div>
    </div>
  </div>

  <div id="powerbar">
    <div id="powerlabel">NO POWER-UP</div>
    <div id="powertrack">
      <div id="powergo"></div>
    </div>
  </div>

  <div id="mobile-ctrl">
    <div style="display: flex; gap: 10px;">
      <div class="mbtn" id="mleft">◀</div>
      <div class="mbtn" id="mright">▶</div>
    </div>
    <div class="mbtn mbtn-fire" id="mfire">FIRE</div>
  </div>

  <div id="wave-announce"></div>
  <div id="boss-announce">⚠ BOSS WAVE ⚠</div>

  <div id="overlay">
    <div id="overlay-box">
      <div id="game-title">VOID STRIKER II</div>
      <div id="instructions">
        ← → or A D &nbsp;│&nbsp; MOVE<br>
        SPACE &nbsp;│&nbsp; FIRE<br>
        B &nbsp;│&nbsp; BOMB<br>
        P &nbsp;│&nbsp; PAUSE
      </div>
      <button id="start-btn">START GAME</button>
      <div id="game-over">
        <div style="color: #f44; font-family: 'Orbitron', sans-serif; font-size: 28px; margin-bottom: 10px;">GAME OVER
        </div>
        <div id="final-score" style="color: #ff0; font-size: 24px; margin-bottom: 20px;">0</div>
        <div style="color: #668; font-size: 12px; margin-bottom: 20px;">WAVE <span id="final-wave">1</span> · <span
            id="final-kills">0</span> KILLS</div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let W, H;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Game state
    let game = {
      score: 0,
      lives: 3,
      wave: 1,
      combo: 1,
      comboTimer: 0,
      kills: 0,
      shots: 0,
      active: false,
      paused: false,
      perf: true,
      power: null,
      powerTimer: 0,
      shield: 0,
      triple: false,
      speed: false,
      laser: false,
      laserTimer: 0,
      extraLifeAt: 2000
    };

    let player = { x: 0, y: 0, w: 28, h: 32, invuln: 0, thrust: 0 };
    let bullets = [];
    let enemyBullets = [];
    let enemies = [];
    let asteroids = [];
    let powerups = [];
    let particles = [];
    let floating = [];
    let boss = null;
    let ufo = null;

    let keys = {};
    let left = false, right = false, fire = false;
    let lastShot = 0;
    let waveClearing = false;
    let shakeX = 0, shakeY = 0, shakeTime = 0;
    let flashR = 0, flashB = 0;
    let frame = 0;

    // Constants
    const ENEMY_COLORS = ['#4af', '#fa0', '#f44', '#c4f', '#0f9'];
    const POWER_INFO = {
      shield: { color: '#0f9', label: 'SHIELD', dur: 600 },
      triple: { color: '#ff0', label: 'TRIPLE', dur: 480 },
      speed: { color: '#4af', label: 'SPEED', dur: 360 },
      bomb: { color: '#fa0', label: 'BOMB', dur: 9999 },
      laser: { color: '#f0f', label: 'LASER', dur: 300 }
    };
    const POWER_KEYS = Object.keys(POWER_INFO);

    // Stars
    const stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * 2000,
        y: Math.random() * 2000,
        z: 0.5 + Math.random() * 1.5,
        size: 0.5 + Math.random() * 1
      });
    }

    // Nebula background
    const nebulaCanvas = document.createElement('canvas');
    nebulaCanvas.width = 400;
    nebulaCanvas.height = 400;
    const nctx = nebulaCanvas.getContext('2d');
    [[100, 100, 120, '#2a005a', 0.15], [300, 200, 100, '#00184a', 0.12], [150, 300, 90, '#4a002a', 0.1]].forEach(([x, y, r, c, a]) => {
      const g = nctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, c + Math.round(a * 255).toString(16).padStart(2, '0'));
      g.addColorStop(1, c + '00');
      nctx.fillStyle = g;
      nctx.beginPath();
      nctx.arc(x, y, r, 0, Math.PI * 2);
      nctx.fill();
    });

    function init() {
      resize(); // Ensure canvas is correct size
      game = {
        score: 0, lives: 3, wave: 1, combo: 1, comboTimer: 0,
        kills: 0, shots: 0, active: true, paused: false, perf: true,
        power: null, powerTimer: 0, shield: 0, triple: false,
        speed: false, laser: false, laserTimer: 0, extraLifeAt: 2000
      };
      player = { x: W / 2 - 14, y: H - 80, w: 28, h: 32, invuln: 0, thrust: 0 };
      bullets = [];
      enemyBullets = [];
      enemies = [];
      asteroids = [];
      powerups = [];
      particles = [];
      floating = [];
      boss = null;
      ufo = null;
      waveClearing = false;
      shakeX = shakeY = shakeTime = flashR = flashB = 0;

      spawnWave();
      updateHUD();
    }

    function spawnWave() {
      enemies = [];
      asteroids = [];
      waveClearing = false;
      const w = game.wave;

      if (w % 5 === 0) {
        spawnBoss();
        showBossAnnounce();
        return;
      }

      const types = [0];
      if (w > 2) types.push(1);
      if (w > 4) types.push(2);
      if (w > 5) types.push(3);
      if (w > 7) types.push(4);

      const cols = Math.min(6 + Math.floor(w * 0.25), 10);
      const rows = Math.min(2 + Math.floor(w * 0.22), 4);
      const gap = Math.min(50, (W - 40) / cols);
      const ox = (W - cols * gap) / 2;

      let idx = 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const type = types[Math.floor(Math.random() * types.length)];
          const hp = type === 2 ? 4 : type === 3 ? 2 : type === 4 ? 3 : 1;
          enemies.push({
            x: ox + c * gap,
            y: -60 - r * 40,
            targetX: ox + c * gap,
            targetY: 50 + r * 35,
            w: 20, h: 16,
            type: type,
            hp: hp, maxHp: hp,
            dir: 1,
            speed: 0.4 + w * 0.05,
            shootTimer: 60 + Math.random() * 80 + idx * 2,
            zigzag: 0,
            entered: false,
            enterDelay: idx * 3
          });
          idx++;
        }
      }

      if (w >= 3) {
        const astCount = Math.min(1 + Math.floor((w - 3) * 0.35), 4);
        for (let i = 0; i < astCount; i++) {
          asteroids.push({
            x: 40 + Math.random() * (W - 80),
            y: 80 + Math.random() * 200,
            r: 12 + Math.random() * 12,
            rot: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.04,
            hp: 3
          });
        }
      }

      announceWave('WAVE ' + w);
    }

    function spawnBoss() {
      const hp = 25 + game.wave * 8;
      boss = {
        x: W / 2 - 50,
        y: -100,
        targetY: 50,
        w: 100, h: 66,
        hp: hp, maxHp: hp,
        phase: 1,
        dir: 1,
        speed: 1 + game.wave * 0.04,
        shootTimer: 60,
        phase2Timer: 300,
        entered: false
      };
    }

    function announceWave(text) {
      const el = document.getElementById('wave-announce');
      el.textContent = text;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1500);
    }

    function showBossAnnounce() {
      const el = document.getElementById('boss-announce');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    function shake(intensity, duration) {
      shakeTime = intensity;
      shakeX = (Math.random() - 0.5) * duration * 2;
      shakeY = (Math.random() - 0.5) * duration * 2;
    }

    function addFloating(x, y, text, color) {
      floating.push({ x, y, text, color, life: 1.2, vy: 1.5 });
    }

    function explode(x, y, color, count = 12) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
        const speed = 2 + Math.random() * 4;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          maxLife: 0.4 + Math.random() * 0.4,
          color,
          size: 2 + Math.random() * 3,
          type: 'spark'
        });
      }
      particles.push({ x, y, r: 1, maxR: 20 + count * 0.8, life: 1, color, type: 'ring' });
    }

    function dropPowerup(x, y) {
      if (Math.random() < 0.22) {
        const type = POWER_KEYS[Math.floor(Math.random() * POWER_KEYS.length)];
        powerups.push({ x: x - 10, y, type, vy: 0.8, wobble: 0 });
      }
    }

    function updateHUD() {
      document.getElementById('score').textContent = game.score.toLocaleString();
      document.getElementById('combo').textContent = '×' + game.combo;
      document.getElementById('lives').textContent = '♥'.repeat(Math.max(0, game.lives));
      document.getElementById('wave').textContent = 'WAVE ' + game.wave;

      const pLabel = document.getElementById('powerlabel');
      const pGo = document.getElementById('powergo');

      if (game.power) {
        const p = POWER_INFO[game.power];
        pLabel.textContent = p.label;
        pLabel.style.color = p.color;
        const pct = Math.min(100, game.powerTimer / POWER_INFO[game.power].dur * 100);
        pGo.style.width = pct + '%';
        pGo.style.background = p.color;
      } else {
        pLabel.textContent = 'NO POWER-UP';
        pLabel.style.color = '#333';
        pGo.style.width = '0%';
      }
    }

    // Input
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
      if ((e.key === 'p' || e.key === 'P') && game.active) {
        game.paused = !game.paused;
      }
      if ((e.key === 'b' || e.key === 'B') && game.active) useBomb();
    });

    document.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    // Mobile controls
    const mLeft = document.getElementById('mleft');
    const mRight = document.getElementById('mright');
    const mFire = document.getElementById('mfire');

    mLeft.addEventListener('touchstart', e => { e.preventDefault(); left = true; });
    mLeft.addEventListener('touchend', () => left = false);
    mRight.addEventListener('touchstart', e => { e.preventDefault(); right = true; });
    mRight.addEventListener('touchend', () => right = false);
    mFire.addEventListener('touchstart', e => { e.preventDefault(); fire = true; });
    mFire.addEventListener('touchend', () => fire = false);

    // Start button
    const startBtn = document.getElementById('start-btn');
    if (startBtn) {
      startBtn.addEventListener('click', () => {
        try {
          document.getElementById('overlay').classList.add('hidden');
          document.getElementById('game-over').classList.remove('show');
          game.active = true;
          init();
        } catch (error) {
          console.error('Error starting game:', error);
          // Show error to user?
          document.getElementById('overlay').classList.remove('hidden');
          alert('Failed to start game. Please try again.');
        }
      });
    } else {
      console.error('Start button not found');
    }

    function useBomb() {
      if (!game.active || game.power !== 'bomb') return;

      for (const e of [...enemies]) {
        explode(e.x + e.w / 2, e.y + e.h / 2, ENEMY_COLORS[e.type], 10);
      }
      enemies = [];
      enemyBullets = [];

      if (boss) {
        boss.hp = Math.max(1, boss.hp - boss.maxHp * 0.28);
      }

      shake(15, 12);
      flashB = 0.5;
      addFloating(W / 2, H / 2, '★ BOMB ★', '#fa0');
      game.power = null;
      game.powerTimer = 0;
      updateHUD();
    }

    function collectPower(type) {
      game.power = type;
      if (type === 'shield') { game.shield = 3; game.powerTimer = 600; }
      else if (type === 'triple') { game.triple = true; game.powerTimer = 480; }
      else if (type === 'speed') { game.speed = true; game.powerTimer = 360; }
      else if (type === 'bomb') { game.powerTimer = 9999; }
      else if (type === 'laser') { game.laser = true; game.powerTimer = 300; game.laserTimer = 300; }

      addFloating(player.x + player.w / 2, player.y - 15, '★ ' + POWER_INFO[type].label, POWER_INFO[type].color);
      updateHUD();
    }

    function hitPlayer() {
      if (game.shield > 0) {
        game.shield--;
        if (game.shield === 0) { game.power = null; updateHUD(); }
        explode(player.x + player.w / 2, player.y + player.h / 2, '#0f9', 8);
        shake(8, 5);
        return;
      }

      game.lives--;
      game.combo = 1;
      game.comboTimer = 0;
      game.perf = false;
      player.invuln = 120;
      shake(15, 10);
      flashR = 0.6;
      explode(player.x + player.w / 2, player.y + player.h / 2, '#0ff', 12);
      updateHUD();

      if (game.lives <= 0) {
        endGame();
      }
    }

    function endGame() {
      game.active = false;
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('game-title').style.display = 'none';
      document.getElementById('instructions').style.display = 'none';
      const startBtn = document.getElementById('start-btn');
      if (startBtn) {
        startBtn.style.display = 'block';
        startBtn.textContent = 'PLAY AGAIN';
      }
      document.getElementById('game-over').classList.add('show');
      document.getElementById('final-score').textContent = game.score.toLocaleString();
      document.getElementById('final-wave').textContent = game.wave;
      document.getElementById('final-kills').textContent = game.kills;
    }

    function killEnemy(idx, x, y) {
      const e = enemies[idx];
      const pts = (e.type + 1) * 10 * game.wave * game.combo;
      game.score += pts;
      game.kills++;
      addFloating(x, y, '+' + pts, ENEMY_COLORS[e.type]);
      explode(x, y, ENEMY_COLORS[e.type], 14);
      dropPowerup(x, y);
      enemies.splice(idx, 1);

      game.combo = Math.min(game.combo + 1, 8);
      game.comboTimer = 90;
      updateHUD();
    }

    function killBoss() {
      const bx = boss.x + boss.w / 2;
      const by = boss.y + boss.h / 2;
      const pts = 600 * game.wave * game.combo;
      game.score += pts;
      game.kills++;
      addFloating(bx, by, 'BOSS DESTROYED! +' + pts, '#f0a');

      for (let i = 0; i < 7; i++) {
        setTimeout(() => explode(bx + (Math.random() - 0.5) * 60, by + (Math.random() - 0.5) * 40, '#f0a', 14), i * 120);
      }

      dropPowerup(bx, by);
      dropPowerup(bx - 30, by);
      boss = null;
      enemies = [];
      enemyBullets = [];
      waveClearing = true;
      shake(20, 15);
      flashB = 0.4;

      game.wave++;
      updateHUD();
      setTimeout(spawnWave, 2000);
    }

    // Update loop
    function update() {
      if (!game.active || game.paused) return;

      frame++;

      // Screen shake
      if (shakeTime > 0) {
        shakeTime--;
        shakeX *= 0.8;
        shakeY *= 0.8;
      }
      if (flashR > 0) flashR -= 0.04;
      if (flashB > 0) flashB -= 0.04;

      // Player movement
      const spd = game.speed ? 8 : 5;
      if (keys['ArrowLeft'] || keys['a'] || left) player.x = Math.max(0, player.x - spd);
      if (keys['ArrowRight'] || keys['d'] || right) player.x = Math.min(W - player.w, player.x + spd);

      if (player.invuln > 0) player.invuln--;
      player.thrust = (player.thrust + 0.15) % (Math.PI * 2);

      // Shooting
      const fireRate = game.triple ? 170 : 220;
      if ((keys[' '] || fire) && Date.now() - lastShot > fireRate) {
        lastShot = Date.now();
        game.shots++;
        const bx = player.x + player.w / 2 - 2;
        const by = player.y;

        if (game.triple) {
          bullets.push({ x: bx, y: by, w: 4, h: 12, speed: 12, angle: 0 });
          bullets.push({ x: bx, y: by, w: 4, h: 12, speed: 11, angle: -0.15 });
          bullets.push({ x: bx, y: by, w: 4, h: 12, speed: 11, angle: 0.15 });
        } else {
          bullets.push({ x: bx, y: by, w: 4, h: 12, speed: 12, angle: 0 });
        }
      }

      // Power timer
      if (game.power && game.power !== 'bomb') {
        game.powerTimer--;
        if (game.powerTimer <= 0) {
          if (game.power === 'shield') game.shield = 0;
          if (game.power === 'triple') game.triple = false;
          if (game.power === 'speed') game.speed = false;
          if (game.power === 'laser') { game.laser = false; game.laserTimer = 0; }
          game.power = null;
          updateHUD();
        }
      }

      // Combo timer
      if (game.combo > 1) {
        game.comboTimer--;
        if (game.comboTimer <= 0) {
          game.combo = 1;
          updateHUD();
        }
      }

      // Bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += Math.sin(b.angle) * b.speed;
        b.y -= b.speed;
        if (b.y < -20) bullets.splice(i, 1);
      }

      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx;
        b.y += b.vy;
        if (b.y > H + 30) enemyBullets.splice(i, 1);
      }

      // Enemy entry
      for (const e of enemies) {
        if (!e.entered) {
          e.enterDelay--;
          if (e.enterDelay <= 0) {
            e.y = Math.min(e.targetY, e.y + 5);
            if (e.y >= e.targetY) {
              e.y = e.targetY;
              e.entered = true;
            }
          }
        }
      }

      // Enemy movement
      const activeEnemies = enemies.filter(e => e.entered);
      if (activeEnemies.length > 0) {
        let hitWall = false;
        for (const e of activeEnemies) {
          if (e.type === 1) {
            e.zigzag += 0.12;
            e.x += e.dir * e.speed * 1.5 + Math.sin(e.zigzag) * 2;
          } else {
            e.x += e.dir * e.speed;
          }
          if (e.x + e.w > W - 5 || e.x < 5) hitWall = true;
        }
        if (hitWall) {
          for (const e of enemies) {
            e.dir *= -1;
            if (e.entered) e.y += 12;
          }
        }
      }

      // Enemy shooting
      for (const e of enemies) {
        if (!e.entered) continue;
        e.shootTimer--;
        if (e.shootTimer > 0) continue;

        e.shootTimer = 65 + Math.random() * 90 - game.wave * 2;
        const ex = e.x + e.w / 2;
        const ey = e.y + e.h;
        const bs = 2.5 + game.wave * 0.1;

        if (e.type === 4) {
          // Spiral shooter
          const dx = player.x + player.w / 2 - ex;
          const dy = player.y - ey;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          enemyBullets.push({ x: ex, y: ey, vx: dx / d * bs, vy: dy / d * bs, color: ENEMY_COLORS[4], r: 3 });
        } else if (e.type === 2) {
          // Triple shooter
          for (let i = -1; i <= 1; i++) {
            enemyBullets.push({ x: ex, y: ey, vx: i * 1.5, vy: bs, color: ENEMY_COLORS[2], r: 4 });
          }
        } else if (e.type === 3) {
          // Aimed shooter
          const dx = player.x + player.w / 2 - ex;
          const dy = player.y - ey;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          enemyBullets.push({ x: ex, y: ey, vx: dx / d * bs, vy: dy / d * bs, color: ENEMY_COLORS[3], r: 4 });
        } else {
          enemyBullets.push({ x: ex, y: ey, vx: 0, vy: bs, color: ENEMY_COLORS[e.type], r: 3 });
        }
      }

      // Boss
      if (boss) {
        if (!boss.entered) {
          boss.y += 2.5;
          if (boss.y >= boss.targetY) {
            boss.y = boss.targetY;
            boss.entered = true;
          }
        } else {
          boss.x += boss.dir * boss.speed;
          if (boss.x + boss.w > W - 10 || boss.x < 10) boss.dir *= -1;

          boss.shootTimer--;
          if (boss.shootTimer <= 0) {
            boss.shootTimer = boss.phase === 1 ? 60 : 35;
            const bx = boss.x + boss.w / 2;
            const by2 = boss.y + boss.h;

            if (boss.phase === 1) {
              for (let i = -1; i <= 1; i++) {
                enemyBullets.push({ x: bx + i * 18, y: by2, vx: i * 1.6, vy: 3.2, color: '#f0a', r: 5 });
              }
            } else {
              for (let i = -2; i <= 2; i++) {
                enemyBullets.push({ x: bx, y: by2, vx: i * 1.8, vy: 3.5, color: '#f44', r: 5 });
              }
              // Aimed shots
              const dx = player.x + player.w / 2 - bx;
              const dy = player.y - by2;
              const d = Math.sqrt(dx * dx + dy * dy) || 1;
              enemyBullets.push({ x: bx - 20, y: by2, vx: dx / d * 4.5, vy: dy / d * 4.5, color: '#ff0', r: 4 });
              enemyBullets.push({ x: bx + 20, y: by2, vx: dx / d * 4.5, vy: dy / d * 4.5, color: '#ff0', r: 4 });
            }
          }

          // Phase change
          const hpPct = boss.hp / boss.maxHp;
          if (hpPct < 0.5 && boss.phase === 1) {
            boss.phase = 2;
            boss.speed *= 1.5;
            shake(12, 8);
          }

          // Phase 2 spawns enemies
          if (boss.phase === 2) {
            boss.phase2Timer--;
            if (boss.phase2Timer <= 0) {
              boss.phase2Timer = 200;
              enemies.push({ x: 50, y: boss.y + boss.h + 15, w: 20, h: 16, type: 1, hp: 1, maxHp: 1, dir: 1, speed: 1.8, shootTimer: 50, zigzag: 0, entered: true, enterDelay: 0 });
              enemies.push({ x: W - 70, y: boss.y + boss.h + 15, w: 20, h: 16, type: 1, hp: 1, maxHp: 1, dir: -1, speed: 1.8, shootTimer: 50, zigzag: 0, entered: true, enterDelay: 0 });
            }
          }
        }
      }

      // UFO
      if (!ufo && Math.random() < 0.0008) {
        ufo = { x: -45, y: 25 + Math.random() * 40, speed: 1.4 + Math.random() * 0.7, w: 40, h: 20, points: 300 + Math.floor(Math.random() * 500) * 10 };
      }
      if (ufo) {
        ufo.x += ufo.speed;
        if (ufo.x > W + 60) ufo = null;
      }

      // Laser
      if (game.laser && game.laserTimer > 0) {
        game.laserTimer--;
        if (game.laserTimer <= 0) {
          game.laser = false;
          if (game.power === 'laser') { game.power = null; updateHUD(); }
        }
        const lx = player.x + player.w / 2;
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          if (lx > e.x && lx < e.x + e.w) {
            killEnemy(i, lx, e.y + e.h / 2);
          }
        }
        if (boss && boss.entered && lx > boss.x && lx < boss.x + boss.w) {
          boss.hp -= 0.4;
          if (boss.hp <= 0) killBoss();
        }
      }

      // Bullet-enemy collisions
      for (let bi = bullets.length - 1; bi >= 0; bi--) {
        const b = bullets[bi];
        let hit = false;

        for (let ei = enemies.length - 1; ei >= 0; ei--) {
          const e = enemies[ei];
          if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
            e.hp--;
            explode(b.x, b.y, ENEMY_COLORS[e.type], 4);
            if (e.hp <= 0) killEnemy(ei, e.x + e.w / 2, e.y + e.h / 2);
            hit = true;
            break;
          }
        }

        if (!hit && boss && boss.entered) {
          if (b.x < boss.x + boss.w && b.x + b.w > boss.x && b.y < boss.y + boss.h && b.y + b.h > boss.y) {
            boss.hp--;
            explode(b.x, b.y, '#f0a', 3);
            if (boss.hp <= 0) killBoss();
            hit = true;
          }
        }

        if (!hit) {
          for (let ai = asteroids.length - 1; ai >= 0; ai--) {
            const a = asteroids[ai];
            const dx = b.x + 2 - a.x;
            const dy = b.y + 6 - a.y;
            if (dx * dx + dy * dy < a.r * a.r) {
              a.hp--;
              explode(b.x, b.y, '#88a', 3);
              if (a.hp <= 0) {
                explode(a.x, a.y, '#aab', 10);
                asteroids.splice(ai, 1);
                game.score += 50 * game.combo;
                updateHUD();
              }
              hit = true;
              break;
            }
          }
        }

        if (!hit && ufo) {
          if (b.x < ufo.x + ufo.w && b.x + b.w > ufo.x && b.y < ufo.y + ufo.h && b.y + b.h > ufo.y) {
            const pts = ufo.points * game.combo;
            addFloating(ufo.x + 20, ufo.y, 'UFO +' + pts, '#ff0');
            game.score += pts;
            explode(ufo.x + 20, ufo.y + 10, '#ff0', 15);
            ufo = null;
            updateHUD();
            hit = true;
          }
        }

        if (hit) bullets.splice(bi, 1);
      }

      // Enemy bullets vs player
      if (player.invuln === 0) {
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const b = enemyBullets[i];
          if (b.x > player.x && b.x < player.x + player.w && b.y > player.y && b.y < player.y + player.h) {
            if (game.shield > 0) {
              game.shield--;
              if (game.shield === 0) { game.power = null; updateHUD(); }
              explode(b.x, b.y, '#0f9', 6);
              enemyBullets.splice(i, 1);
              shake(5, 3);
            } else {
              hitPlayer();
              enemyBullets.splice(i, 1);
            }
          }
        }
      }

      // Player-enemy collision
      if (player.invuln === 0) {
        for (const e of enemies) {
          if (e.x < player.x + player.w && e.x + e.w > player.x && e.y < player.y + player.h && e.y + e.h > player.y) {
            if (game.shield > 0) {
              game.shield = 0;
              game.power = null;
              updateHUD();
            } else {
              hitPlayer();
            }
          }
        }
      }

      // Enemies at bottom
      for (const e of enemies) {
        if (e.y + e.h > H - 10) {
          game.lives = 0;
          updateHUD();
          endGame();
          return;
        }
      }

      // Powerup collection
      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y += p.vy;
        p.wobble += 0.12;

        if (p.x < player.x + player.w && p.x + p.w > player.x && p.y < player.y + player.h && p.y + p.h > player.y) {
          collectPower(p.type);
          powerups.splice(i, 1);
          flashB = 0.3;
        }
      }

      // Remove off-screen powerups
      for (let i = powerups.length - 1; i >= 0; i--) {
        if (powerups[i].y > H + 50) powerups.splice(i, 1);
      }

      // Extra life
      if (game.score >= game.extraLifeAt) {
        game.lives = Math.min(game.lives + 1, 5);
        game.extraLifeAt *= 3;
        addFloating(W / 2, H / 2, '★ EXTRA LIFE!', '#0f9');
        flashB = 0.5;
        updateHUD();
      }

      // Wave clear
      if (!waveClearing && enemies.length === 0 && !boss) {
        waveClearing = true;
        const bonus = game.wave * 100;
        game.score += bonus;
        if (game.perf) {
          game.score += game.wave * 50;
          addFloating(W / 2, H / 2 - 25, 'PERFECT WAVE!', '#ff0');
        }
        addFloating(W / 2, H / 2 + 20, 'WAVE BONUS +' + bonus, '#0f9');
        game.wave++;
        game.perf = true;
        updateHUD();
        setTimeout(spawnWave, 1500);
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        if (p.type === 'spark') {
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.92;
          p.vy *= 0.92;
          p.life -= 1 / (p.maxLife * 60);
          if (p.life <= 0) particles.splice(i, 1);
        } else {
          p.r += 2;
          p.life -= 0.04;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      // Update floating text
      for (let i = floating.length - 1; i >= 0; i--) {
        const f = floating[i];
        f.y -= f.vy * 0.5;
        f.life -= 0.025;
        if (f.life <= 0) floating.splice(i, 1);
      }
    }

    // Draw
    function draw() {
      ctx.save();

      // Background
      ctx.fillStyle = '#030016';
      ctx.fillRect(0, 0, W, H);

      // Stars
      for (const s of stars) {
        s.y += s.z;
        if (s.y > H) s.y = 0;
        const brightness = 0.3 + s.z * 0.3;
        ctx.fillStyle = `rgba(200, 215, 255, ${brightness})`;
        ctx.beginPath();
        ctx.arc(s.x % W, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
      }

      // Nebula
      ctx.globalAlpha = 0.4;
      ctx.drawImage(nebulaCanvas, W - 150, 30);
      ctx.globalAlpha = 1;

      // Screen shake
      if (shakeTime > 0) {
        ctx.translate(Math.round(shakeX), Math.round(shakeY));
      }

      // Asteroids
      for (const a of asteroids) {
        ctx.save();
        ctx.translate(a.x, a.y);
        ctx.rotate(a.rot);
        ctx.strokeStyle = '#7788aa';
        ctx.fillStyle = '#060610';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const angle = i / 8 * Math.PI * 2;
          const r2 = a.r * (0.7 + Math.sin(angle * 3) * 0.3);
          ctx.lineTo(Math.cos(angle) * r2, Math.sin(angle) * r2);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
        a.rot += a.rotSpeed;
      }

      // Enemies
      for (const e of enemies) {
        const ex = e.x, ey = e.y, ew = e.w, eh = e.h;
        const cx2 = ex + ew / 2, cy2 = ey + eh / 2;
        const col = ENEMY_COLORS[e.type];
        const fills = ['#010c1c', '#120a00', '#130000', '#0c0020', '#001310'];

        ctx.save();
        ctx.shadowColor = col;
        ctx.shadowBlur = 10;
        ctx.strokeStyle = col;
        ctx.lineWidth = 1.5;
        ctx.fillStyle = fills[e.type];

        if (e.type === 0) {
          // Hexagon
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = i / 6 * Math.PI * 2 - Math.PI / 6;
            ctx.lineTo(cx2 + Math.cos(a) * (ew / 2 - 1), cy2 + Math.sin(a) * (eh / 2 - 1));
          }
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        } else if (e.type === 1) {
          // Triangle
          ctx.beginPath();
          ctx.moveTo(cx2, ey);
          ctx.lineTo(ex + ew, cy2);
          ctx.lineTo(cx2, ey + eh);
          ctx.lineTo(ex, cy2);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        } else if (e.type === 2) {
          // Diamond
          ctx.beginPath();
          ctx.moveTo(ex + 5, ey);
          ctx.lineTo(ex + ew - 5, ey);
          ctx.lineTo(ex + ew, cy2);
          ctx.lineTo(ex + ew - 5, ey + eh);
          ctx.lineTo(ex + 5, ey + eh);
          ctx.lineTo(ex, cy2);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        } else if (e.type === 3) {
          // Arrow
          ctx.beginPath();
          ctx.moveTo(cx2, ey);
          ctx.lineTo(ex + ew, ey + eh);
          ctx.lineTo(ex, ey + eh);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        } else {
          // Octagon
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const a = i / 8 * Math.PI * 2 - Math.PI / 8;
            const r2 = i % 2 === 0 ? ew / 2 - 1 : ew / 4;
            ctx.lineTo(cx2 + Math.cos(a) * r2, cy2 + Math.sin(a) * r2);
          }
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        }

        // HP bar
        if (e.hp < e.maxHp && e.maxHp > 1) {
          ctx.fillStyle = 'rgba(255, 0, 0, 0.25)';
          ctx.fillRect(ex, ey - 6, ew, 3);
          ctx.fillStyle = col;
          ctx.fillRect(ex, ey - 6, ew * e.hp / e.maxHp, 3);
        }

        ctx.restore();
      }

      // Boss
      if (boss) {
        const bx = boss.x, by = boss.y, bw = boss.w, bh = boss.h;
        const bcx = bx + bw / 2, bcy = by + bh / 2;
        const col = boss.phase === 1 ? '#f0a' : '#f44';
        const pulse = 0.85 + Math.sin(Date.now() / 120) * 0.15;

        ctx.save();
        ctx.shadowColor = col;
        ctx.shadowBlur = 25 * pulse;
        ctx.strokeStyle = col;
        ctx.lineWidth = 2;
        ctx.fillStyle = boss.phase === 1 ? '#110009' : '#110000';

        ctx.beginPath();
        ctx.moveTo(bcx, by);
        ctx.lineTo(bx + bw, by + bh * 0.3);
        ctx.lineTo(bx + bw - 12, by + bh);
        ctx.lineTo(bx + 12, by + bh);
        ctx.lineTo(bx, by + bh * 0.3);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Boss eye
        ctx.shadowBlur = 15;
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.arc(bcx, bcy, 12, 0, Math.PI * 2);
        ctx.fill();

        // Boss HP
        const hpPct = boss.hp / boss.maxHp;
        ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
        ctx.fillRect(bx - 15, by - 18, bw + 30, 6);
        const hpCol = hpPct > 0.5 ? '#0f9' : hpPct > 0.25 ? '#ff0' : '#f44';
        ctx.fillStyle = hpCol;
        ctx.fillRect(bx - 15, by - 18, (bw + 30) * hpPct, 6);

        ctx.restore();
      }

      // UFO
      if (ufo) {
        ctx.save();
        ctx.shadowColor = '#ff0';
        ctx.shadowBlur = 15;
        ctx.strokeStyle = '#ff0';
        ctx.fillStyle = '#101000';
        ctx.lineWidth = 1.5;

        ctx.beginPath();
        ctx.ellipse(ufo.x + 20, ufo.y + 8, 20, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.shadowColor = '#4af';
        ctx.strokeStyle = '#4af';
        ctx.fillStyle = '#001018';
        ctx.beginPath();
        ctx.ellipse(ufo.x + 20, ufo.y + 4, 10, 6, 0, Math.PI, 0);
        ctx.fill();
        ctx.stroke();

        // Lights
        for (let i = 0; i < 5; i++) {
          const lx = ufo.x + 5 + i * 7.5;
          const on = Math.floor(Date.now() / 180 + i) % 2 === 0;
          ctx.fillStyle = on ? '#ff0' : '#221100';
          ctx.beginPath();
          ctx.arc(lx, ufo.y + 12, 2, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      // Powerups
      for (const p of powerups) {
        const col = POWER_INFO[p.type].color;
        const wy = p.y + Math.sin(p.wobble) * 4;

        ctx.save();
        ctx.translate(p.x + 10, wy + 10);
        ctx.shadowColor = col;
        ctx.shadowBlur = 18;
        ctx.strokeStyle = col;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
        ctx.lineWidth = 1.5;

        ctx.beginPath();
        ctx.arc(0, 0, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = col;
        ctx.font = 'bold 9px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText({ shield: 'S', triple: 'T', speed: 'V', bomb: 'B', laser: 'L' }[p.type], 0, 0);

        ctx.restore();
      }

      // Player bullets
      for (const b of bullets) {
        ctx.save();
        ctx.shadowColor = '#ff0';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#fff8cc';
        ctx.fillRect(b.x + 1, b.y, 2, 5);
        ctx.fillStyle = '#ff0';
        ctx.fillRect(b.x, b.y + 4, b.w, b.h - 5);
        ctx.restore();
      }

      // Laser beam
      if (game.laser && game.laserTimer > 0) {
        const lx = player.x + player.w / 2;
        const intensity = game.laserTimer / 300;

        ctx.save();
        ctx.shadowColor = '#f0f';
        ctx.shadowBlur = 25 * intensity;
        ctx.strokeStyle = `rgba(255, 0, 255, ${0.4 + Math.sin(Date.now() / 40) * 0.2})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(lx, player.y);
        ctx.lineTo(lx, 0);
        ctx.stroke();

        ctx.strokeStyle = `rgba(255, 200, 255, ${0.6 * intensity})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(lx, player.y);
        ctx.lineTo(lx, 0);
        ctx.stroke();
        ctx.restore();
      }

      // Enemy bullets
      for (const b of enemyBullets) {
        ctx.save();
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 12;
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Player
      if (!(player.invuln > 0 && Math.floor(player.invuln / 5) % 2 === 0)) {
        const px = player.x, py = player.y;
        const pcx = px + player.w / 2;

        ctx.save();

        // Thruster flame
        const flameLen = 8 + Math.sin(player.thrust) * 4;
        const flameGrad = ctx.createLinearGradient(0, py + player.h, 0, py + player.h + flameLen + 10);
        flameGrad.addColorStop(0, 'rgba(0, 235, 200, 0.9)');
        flameGrad.addColorStop(0.5, 'rgba(0, 140, 255, 0.5)');
        flameGrad.addColorStop(1, 'rgba(0, 60, 255, 0)');
        ctx.fillStyle = flameGrad;
        ctx.beginPath();
        ctx.moveTo(pcx - 5, py + player.h - 3);
        ctx.lineTo(pcx, py + player.h + flameLen + 5);
        ctx.lineTo(pcx + 5, py + player.h - 3);
        ctx.closePath();
        ctx.fill();

        // Ship body
        ctx.shadowColor = '#0ff';
        ctx.shadowBlur = 20;
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 1.5;
        ctx.fillStyle = '#021c2a';

        ctx.beginPath();
        ctx.moveTo(pcx, py);
        ctx.lineTo(px, py + player.h);
        ctx.lineTo(px + 5, py + player.h - 6);
        ctx.lineTo(pcx, py + player.h - 14);
        ctx.lineTo(px + player.w - 5, py + player.h - 6);
        ctx.lineTo(px + player.w, py + player.h);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Cockpit
        ctx.shadowColor = '#5ff';
        ctx.shadowBlur = 8;
        ctx.strokeStyle = '#5ff8';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(pcx, py + 4);
        ctx.lineTo(pcx, py + player.h - 15);
        ctx.stroke();

        ctx.shadowColor = '#0ffc';
        ctx.shadowBlur = 16;
        ctx.fillStyle = '#0ffb';
        ctx.beginPath();
        ctx.arc(pcx, py + player.h - 14, 4, 0, Math.PI * 2);
        ctx.fill();

        // Shield
        if (game.shield > 0) {
          const shieldAlpha = 0.4 + Math.sin(Date.now() / 200) * 0.15;
          ctx.shadowColor = '#0f9';
          ctx.shadowBlur = game.shield > 1 ? 20 : 10;
          ctx.strokeStyle = `rgba(0, 255, 150, ${shieldAlpha + (game.shield > 1 ? 0.2 : 0)})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(pcx, py + player.h / 2, 26, 0, Math.PI * 2);
          ctx.stroke();

          if (game.shield > 1) {
            ctx.strokeStyle = `rgba(0, 200, 100, ${shieldAlpha * 0.4})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.arc(pcx, py + player.h / 2, 32, 0, Math.PI * 2);
            ctx.stroke();
          }
        }

        ctx.restore();
      }

      // Particles
      for (const p of particles) {
        if (p.type === 'spark') {
          ctx.globalAlpha = p.life * 0.85;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.globalAlpha = p.life * 0.45;
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      // Floating text
      for (const f of floating) {
        ctx.globalAlpha = Math.min(1, f.life * 0.9);
        ctx.save();
        ctx.shadowColor = f.color;
        ctx.shadowBlur = 8;
        ctx.fillStyle = f.color;
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(f.text, f.x, f.y);
        ctx.restore();
        ctx.globalAlpha = 1;
      }

      // Flash effects
      if (flashR > 0) {
        ctx.fillStyle = `rgba(255, 0, 0, ${flashR * 0.25})`;
        ctx.fillRect(0, 0, W, H);
      }
      if (flashB > 0) {
        ctx.fillStyle = `rgba(0, 255, 255, ${flashB * 0.2})`;
        ctx.fillRect(0, 0, W, H);
      }

      // CRT scanlines
      ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
      for (let y = 0; y < H; y += 3) {
        ctx.fillRect(0, y, W, 1);
      }

      ctx.restore();

      // Combo bar
      if (game.combo > 1) {
        const pct = game.comboTimer / 90;
        ctx.fillStyle = `hsla(${55 - game.combo * 6}, 100%, 58%, 0.75)`;
        ctx.fillRect(0, H - 4, W * pct, 4);
      }

      // Pause overlay
      if (game.paused) {
        ctx.fillStyle = 'rgba(3, 0, 22, 0.8)';
        ctx.fillRect(0, 0, W, H);
        ctx.save();
        ctx.shadowColor = '#0ff';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#0ff';
        ctx.font = 'bold 28px Orbitron, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', W / 2, H / 2);
        ctx.font = '11px Arial';
        ctx.fillStyle = '#668';
        ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
        ctx.restore();
      }
    }

    // Main loop
    function loop() {
      requestAnimationFrame(loop);
      update();
      draw();
    }

    loop();
  </script>
</body>

</html>
