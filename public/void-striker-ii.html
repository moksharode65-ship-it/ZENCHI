<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🎮 Void Striker II</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #030016;
      color: #fff;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    #gameCanvas {
      display: block;
      margin: 0 auto;
      background: #030016;
    }

    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: linear-gradient(180deg, #00000c 0%, transparent 100%);
      z-index: 100;
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hud-label {
      font-size: 8px;
      color: rgba(0, 200, 255, 0.6);
      letter-spacing: 1.5px;
    }

    .hud-value {
      font-size: 18px;
      font-weight: bold;
    }

    #startScreen,
    #gameOverScreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(3, 0, 22, 0.95);
      z-index: 200;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 5px;
      color: #0ff;
      margin-bottom: 20px;
    }

    .instructions {
      font-size: 10px;
      color: #445;
      line-height: 2;
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 30px;
    }

    .start-btn {
      padding: 12px 40px;
      background: transparent;
      border: 1px solid rgba(0, 255, 255, 0.4);
      color: #0ff;
      font: bold 12px 'Courier New';
      letter-spacing: 3px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .start-btn:hover {
      background: rgba(0, 255, 255, 0.1);
    }

    .hidden {
      display: none !important;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 100;
    }

    .control-btn {
      width: 60px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.2);
      color: #0ff;
      font-size: 18px;
      cursor: pointer;
    }

    .control-btn:active {
      background: rgba(0, 255, 255, 0.2);
    }
  </style>
</head>

<body>
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">WAVE</span>
      <span class="hud-value" id="wave">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LIVES</span>
      <span class="hud-value" id="lives" style="color:#f55">♥♥♥</span>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="startScreen">
    <div class="title">VOID STRIKER II</div>
    <div class="instructions">
      ← → or A D : MOVE<br>
      SPACE : FIRE<br>
      B : BOMB<br>
      P : PAUSE
    </div>
    <button class="start-btn" onclick="startGame()">START GAME</button>
  </div>

  <div id="gameOverScreen" class="hidden">
    <div class="title">GAME OVER</div>
    <div class="instructions">
      FINAL SCORE: <span id="finalScore" style="color:#ff0">0</span>
    </div>
    <button class="start-btn" onclick="startGame()">PLAY AGAIN</button>
  </div>

  <div id="controls" class="hidden">
    <div class="control-btn" id="leftBtn">◀</div>
    <div class="control-btn" id="fireBtn">●</div>
    <div class="control-btn" id="bombBtn">💣</div>
    <div class="control-btn" id="rightBtn">▶</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 480;
    canvas.height = 600;

    let gameRunning = false;
    let score = 0;
    let wave = 1;
    let lives = 3;
    let player = { x: 220, y: 520, width: 30, height: 30, speed: 5 };
    let bullets = [];
    let enemies = [];
    let enemyBullets = [];
    let particles = [];
    let bombs = 3;
    let lastShot = 0;
    let keys = {};
    let waveEnemies = 0;
    let waveSpawned = 0;

    function startGame() {
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');
      document.getElementById('controls').classList.remove('hidden');

      score = 0;
      wave = 1;
      lives = 3;
      player = { x: 220, y: 520, width: 30, height: 30, speed: 5 };
      bullets = [];
      enemies = [];
      enemyBullets = [];
      particles = [];
      bombs = 3;
      waveEnemies = 10;
      waveSpawned = 0;
      gameRunning = true;

      updateHUD();
      gameLoop();
    }

    function updateHUD() {
      document.getElementById('score').textContent = score;
      document.getElementById('wave').textContent = wave;
      document.getElementById('lives').textContent = '♥'.repeat(lives);
    }

    function spawnEnemy() {
      if (waveSpawned >= waveEnemies) return;

      const types = ['fighter', 'fighter', 'fighter', 'zigzag', 'shooter'];
      const type = types[Math.floor(Math.random() * types.length)];

      enemies.push({
        x: Math.random() * 440,
        y: -30,
        width: type === 'shooter' ? 40 : 25,
        height: type === 'shooter' ? 40 : 25,
        type: type,
        hp: type === 'shooter' ? 3 : 1,
        speed: type === 'zigzag' ? 2 : 1.5,
        angle: 0,
        shootTimer: 0
      });
      waveSpawned++;
    }

    function shoot() {
      const now = Date.now();
      if (now - lastShot > 150) {
        bullets.push({ x: player.x + player.width / 2 - 3, y: player.y, width: 6, height: 15, speed: 8 });
        lastShot = now;
      }
    }

    function enemyShoot(enemy) {
      enemyBullets.push({
        x: enemy.x + enemy.width / 2,
        y: enemy.y + enemy.height,
        width: 6,
        height: 10,
        speed: 4
      });
    }

    function useBomb() {
      if (bombs > 0 && gameRunning) {
        bombs--;
        // Kill all enemies
        enemies.forEach(e => {
          score += 10;
          createParticles(e.x + e.width / 2, e.y + e.height / 2, '#0ff');
        });
        enemies = [];
        enemyBullets = [];
        createParticles(240, 300, '#0ff', 50);
        updateHUD();
      }
    }

    function createParticles(x, y, color, count = 10) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.5) * 8,
          life: 30,
          color: color
        });
      }
    }

    function gameOver() {
      gameRunning = false;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverScreen').classList.remove('hidden');
      document.getElementById('controls').classList.add('hidden');
    }

    function update() {
      if (!gameRunning) return;

      // Player movement
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x = Math.max(0, player.x - player.speed);
      if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x = Math.min(canvas.width - player.width, player.x + player.speed);
      if (keys[' ']) shoot();
      if (keys['b'] || keys['B']) { useBomb(); keys['b'] = false; keys['B'] = false; }

      // Spawn enemies
      if (Math.random() < 0.03 && waveSpawned < waveEnemies) spawnEnemy();

      // Update bullets
      bullets = bullets.filter(b => {
        b.y -= b.speed;
        return b.y > -20;
      });

      // Update enemies
      enemies.forEach(e => {
        if (e.type === 'zigzag') {
          e.angle += 0.1;
          e.x += Math.sin(e.angle) * e.speed;
        } else {
          e.y += e.speed;
        }

        // Shooters shoot
        if (e.type === 'shooter') {
          e.shootTimer++;
          if (e.shootTimer > 120) {
            enemyShoot(e);
            e.shootTimer = 0;
          }
        }

        // Collision with bullets
        bullets.forEach((b, bi) => {
          if (b.x < e.x + e.width && b.x + b.width > e.x &&
            b.y < e.y + e.height && b.y + b.height > e.y) {
            e.hp--;
            bullets.splice(bi, 1);
            if (e.hp <= 0) {
              score += e.type === 'shooter' ? 30 : 10;
              createParticles(e.x + e.width / 2, e.y + e.height / 2, '#f55');
            }
          }
        });

        // Collision with player
        if (player.x < e.x + e.width && player.x + player.width > e.x &&
          player.y < e.y + e.height && player.y + player.height > e.y) {
          lives--;
          createParticles(player.x + player.width / 2, player.y + player.height / 2, '#f55', 20);
          enemies = enemies.filter(en => en !== e);
          if (lives <= 0) gameOver();
        }
      });

      enemies = enemies.filter(e => e.y < canvas.height + 50 && e.hp > 0);

      // Update enemy bullets
      enemyBullets.forEach(eb => {
        eb.y += eb.speed;
        if (player.x < eb.x + eb.width && player.x + player.width > eb.x &&
          player.y < eb.y + eb.height && player.y + player.height > eb.y) {
          lives--;
          createParticles(player.x + player.width / 2, player.y + player.height / 2, '#f55', 20);
          enemyBullets = enemyBullets.filter(e => e !== eb);
          if (lives <= 0) gameOver();
        }
      });
      enemyBullets = enemyBullets.filter(eb => eb.y < canvas.height + 20);

      // Update particles
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
      });
      particles = particles.filter(p => p.life > 0);

      // Wave complete
      if (waveSpawned >= waveEnemies && enemies.length === 0) {
        wave++;
        waveEnemies = 10 + wave * 3;
        waveSpawned = 0;
        createParticles(canvas.width / 2, canvas.height / 2, '#0ff', 30);
      }

      updateHUD();
    }

    function render() {
      ctx.fillStyle = '#030016';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Stars
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 50; i++) {
        ctx.fillRect((i * 73) % canvas.width, (i * 97) % canvas.height, 1, 1);
      }

      // Player
      ctx.fillStyle = '#0ff';
      ctx.beginPath();
      ctx.moveTo(player.x + player.width / 2, player.y);
      ctx.lineTo(player.x + player.width, player.y + player.height);
      ctx.lineTo(player.x, player.y + player.height);
      ctx.fill();

      // Bullets
      ctx.fillStyle = '#ff0';
      bullets.forEach(b => {
        ctx.fillRect(b.x, b.y, b.width, b.height);
      });

      // Enemies
      enemies.forEach(e => {
        if (e.type === 'shooter') {
          ctx.fillStyle = '#f0f';
        } else if (e.type === 'zigzag') {
          ctx.fillStyle = '#fa0';
        } else {
          ctx.fillStyle = '#f55';
        }
        ctx.fillRect(e.x, e.y, e.width, e.height);
      });

      // Enemy bullets
      ctx.fillStyle = '#f55';
      enemyBullets.forEach(eb => {
        ctx.fillRect(eb.x, eb.y, eb.width, eb.height);
      });

      // Particles
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 30;
        ctx.fillRect(p.x, p.y, 3, 3);
      });
      ctx.globalAlpha = 1;
    }

    function gameLoop() {
      if (gameRunning) {
        update();
        render();
        requestAnimationFrame(gameLoop);
      }
    }

    // Input handlers
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'p' || e.key === 'P') {
        gameRunning = !gameRunning;
        if (gameRunning) gameLoop();
      }
    });

    document.addEventListener('keyup', e => keys[e.key] = false);

    // Touch controls
    document.getElementById('leftBtn').addEventListener('touchstart', () => keys['ArrowLeft'] = true);
    document.getElementById('leftBtn').addEventListener('touchend', () => keys['ArrowLeft'] = false);
    document.getElementById('rightBtn').addEventListener('touchstart', () => keys['ArrowRight'] = true);
    document.getElementById('rightBtn').addEventListener('touchend', () => keys['ArrowRight'] = false);
    document.getElementById('fireBtn').addEventListener('touchstart', () => keys[' '] = true);
    document.getElementById('fireBtn').addEventListener('touchend', () => keys[' '] = false);
    document.getElementById('bombBtn').addEventListener('touchstart', () => { keys['b'] = true; });
    document.getElementById('bombBtn').addEventListener('touchend', () => keys['b'] = false);
  </script>
</body>

</html>
